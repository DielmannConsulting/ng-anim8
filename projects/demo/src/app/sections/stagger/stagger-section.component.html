<section id="stagger" class="anim-section">
  <div class="anim-section__header">
    <h2 class="anim-section__title">Stagger</h2>
    <p class="anim-section__desc">Staggered enter delay on list children via MutationObserver</p>
  </div>

  <div class="anim-section__controls">
    <button class="btn-toggle" (click)="addItem()">Add item</button>
    <button class="btn-toggle btn-toggle--muted" (click)="reset()">Reset</button>
  </div>

  <div class="anim-section__preview anim-section__preview--column">
    <anim8-stagger [gap]="75">
      @for (item of items(); track item) {
        <div class="preview-box preview-box--stagger-item">{{ item }}</div>
      }
    </anim8-stagger>
  </div>

  <app-code-snippet [code]="code" />
</section>
